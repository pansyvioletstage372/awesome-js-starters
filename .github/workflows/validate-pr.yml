name: Validate Package Submission

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/**"

jobs:
  validate:
    name: Validate README format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find changed package READMEs
        id: changed
        run: |
          FILES=$(git diff --name-only --diff-filter=ACM ${{ github.event.pull_request.base.sha }} ${{ github.sha }} -- 'packages/**/README.md' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Validate README format
        if: steps.changed.outputs.files != ''
        run: |
          echo "${{ steps.changed.outputs.files }}" | while read -r file; do
            if [ -n "$file" ]; then
              node scripts/validate-package-readme.js "$file"
            fi
          done

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build package index
        working-directory: web
        run: |
          npm ci
          npx tsx scripts/build-package-index.ts
